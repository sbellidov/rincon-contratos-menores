name: Actualizar datos de contratos

on:
  schedule:
    - cron: '0 6 * * *'   # Todos los días a las 06:00 UTC
  workflow_dispatch:        # Permite lanzarlo manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline ETL
        run: |
          python scripts/download_data.py
          python scripts/process_data.py
          python scripts/analyze_data.py
          python scripts/audit_data.py

      - name: Sincronizar JSONs a web/data/
        run: cp data/processed/*.json web/data/

      - name: Commit y push si hay datos nuevos
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos. Nada que commitear."
          else
            git commit -m "chore(data): actualizar contratos $(date +'%Y-%m-%d')"
            git push
          fi
